<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Propriedades</title>
  <style>
    body {
      background-color: cornflowerblue;
      color: white;
      font-size: 18px;
    }
    /* Não mude o CSS acima, adicione seu CSS abaixo */
    
    .fonte{
    font-family: "Caveat", cursive;
    font-optical-sizing: auto;
    font-weight: 400;
    font-style: normal;
    }

    body{
        font-size: 30px;
    }
    
  </style>
</head>

<body>
  <h1>Important CSS Properties</h1>
  <p style="color: coral;">Color</p>
  <p style="font-size: 5rem;">Font Size</p>
  <p style="font-weight: 900;">Font Weight</p>
  <p class="fonte">Font Family</p>
  <p style="text-align: right;">Text Align</p>

  <!-- TODOs
  1. Mude a cor do <p>Color</p> para a cor "coral".
  2. Mude o tamanho da fonte do <p>Font Size</p> para 2X o tamanho da fonte raiz (use a unidade rem).
  3. Mude o peso da fonte (font-weight) do <p>Font Weight</p> para 900.
  4. Mude a família da fonte (font-family) do <p>Font Family</p> para a fonte do Google Caveat com peso regular (400).
    - Link para a fonte: https://fonts.google.com/specimen/Caveat
  5. Mude o alinhamento de texto (text-align) do <p>Text Align</p> para alinhamento à direita.
  6. Mude o tamanho da fonte raiz (elemento html) para 30px.  -->
</body>

</html>
